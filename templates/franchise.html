{% extends "base.html" %}
{% block title %}가맹점 통계 조회{% endblock %}
{% block content %}
<h1 class="page-title">가맹점 통계 조회 <small>(공정거래위원회)</small></h1>

<form id="searchForm" class="panel">
  <div class="row">
    <label>연도
      <select name="yr" id="yr"></select>
    </label>
    <label>업종대분류
      <select name="lclas">
        {% for l in lclas %}<option>{{ l }}</option>{% endfor %}
      </select>
    </label>
    <label>업종중분류 <input type="text" name="mlsfc" placeholder="예: 치킨"></label>
    <label class="grow">브랜드/가맹본부 <input type="text" name="keyword" placeholder="예: 교촌"></label>
  </div>
  <div class="row actions">
    <button type="submit" class="btn primary">조회</button>
    <button type="button" class="btn" id="aggBtn">업종별 집계</button>
    <button type="button" class="btn" id="csvBtn">CSV 저장</button>
    <span id="status" class="status"></span>
  </div>
  <p class="hint">※ 연도 전체(약 1만건)를 받아 필터링하므로 첫 조회는 수 초 걸릴 수 있습니다. 매출 단위: 천원.</p>
</form>

<div class="result-meta"><span id="count">0건</span></div>
<div class="table-wrap">
  <table id="resultTable"><thead></thead><tbody></tbody></table>
</div>

<div id="aggModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-head"><h3>업종별 집계</h3><button id="aggClose" class="btn">닫기</button></div>
    <div class="table-wrap">
      <table id="aggTable"><thead><tr>
        <th>업종대분류</th><th>업종중분류</th><th class="num">브랜드수</th>
        <th class="num">총가맹점수</th><th class="num">평균매출액(천원)</th>
      </tr></thead><tbody></tbody></table>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/franchise.js') }}"></script>
{% endblock %}
